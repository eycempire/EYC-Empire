<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EYC Empire — Workshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --bg0: #0a0c0f;
  --bg1: #0f1217;
  --bg2: #151820;
  --bg3: #1c2030;
  --bg4: #232840;
  --border: #2a3050;
  --border2: #3a4570;
  --accent: #00e5ff;
  --accent2: #ff6b35;
  --accent3: #7fff00;
  --text: #c8d4e8;
  --text2: #7a8aaa;
  --text3: #4a5570;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Exo 2', sans-serif;
  --red: #ff4444;
  --amber: #ffaa00;
  --green: #00ff88;
  --sidebar-w: 240px;
  --topbar-h: 52px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg0);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* === GRID BACKGROUND === */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* === CORNER MARKS === */
.corner-mark {
  position: fixed;
  width: 20px; height: 20px;
  border-color: var(--accent);
  border-style: solid;
  opacity: 0.3;
  z-index: 1;
  pointer-events: none;
}
.corner-mark.tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
.corner-mark.tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
.corner-mark.bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
.corner-mark.br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

/* === LAYOUT === */
.app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* === TOPBAR === */
.topbar {
  height: var(--topbar-h);
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
}

.topbar::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.4;
}

.logo {
  font-family: var(--mono);
  font-size: 16px;
  color: var(--accent);
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.logo-bracket { color: var(--text3); }
.logo-dot {
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; box-shadow: 0 0 4px var(--accent); }
  50% { opacity: 0.4; box-shadow: none; }
}

.topbar-sep { flex: 1; }

.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.search-wrap i {
  position: absolute;
  left: 10px;
  color: var(--text3);
  font-size: 15px;
  pointer-events: none;
}
#search-input {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 6px 10px 6px 32px;
  border-radius: 4px;
  width: 200px;
  transition: all 0.2s;
  outline: none;
}
#search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 8px rgba(0,229,255,0.15);
  width: 260px;
}
#search-input::placeholder { color: var(--text3); }

.topbar-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 6px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  position: relative;
}
.topbar-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg3); }
.topbar-btn[title]:hover::after {
  content: attr(title);
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 3px;
  white-space: nowrap;
  z-index: 100;
}

.user-tag {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text3);
  display: flex; align-items: center; gap: 6px;
}
.user-tag span { color: var(--accent2); }

/* === BODY === */
.body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* === SIDEBAR === */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  transition: width 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
  position: relative;
}

.sidebar.collapsed {
  width: 0;
  opacity: 0;
  overflow: hidden;
}

.sidebar-section-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 2px;
  padding: 16px 14px 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sidebar-section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  font-size: 13px;
  font-weight: 400;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  position: relative;
}
.nav-item:hover { background: var(--bg2); color: var(--text); }
.nav-item.active {
  background: var(--bg3);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 1px;
  background: var(--accent);
  opacity: 0.3;
}
.nav-item i { font-size: 16px; flex-shrink: 0; }

.nav-badge {
  margin-left: auto;
  background: var(--bg4);
  border: 1px solid var(--border2);
  color: var(--text3);
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 2px;
  flex-shrink: 0;
}
.nav-item.active .nav-badge { border-color: var(--accent); color: var(--accent); }

.nav-status-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-left: 2px;
}
.status-active { background: var(--green); box-shadow: 0 0 4px var(--green); }
.status-progress { background: var(--amber); }
.status-hold { background: var(--text3); }
.status-archived { background: var(--red); opacity: 0.5; }

.sidebar-add-btn {
  margin: 8px 10px;
  padding: 8px 12px;
  border: 1px dashed var(--border2);
  background: none;
  color: var(--text3);
  font-family: var(--mono);
  font-size: 12px;
  border-radius: 4px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.2s;
  white-space: nowrap;
  width: calc(100% - 20px);
}
.sidebar-add-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,229,255,0.04);
}

/* === MAIN === */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.main-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
  background: var(--bg1);
}

.main-title-block { flex: 1; min-width: 0; }

.main-title {
  font-family: var(--mono);
  font-size: 18px;
  color: var(--accent);
  letter-spacing: 1px;
  display: flex; align-items: center; gap: 10px;
}

.main-title-prefix { color: var(--text3); font-size: 14px; }

.main-subtitle {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
  font-family: var(--mono);
}

.status-select {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 3px;
  cursor: pointer;
  outline: none;
}
.status-select:focus { border-color: var(--accent); }

.main-actions { display: flex; align-items: center; gap: 8px; }

.action-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: var(--mono);
  font-size: 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg3); }
.action-btn.primary {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,229,255,0.06);
}
.action-btn.primary:hover { background: rgba(0,229,255,0.12); }

/* === CONTENT === */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-track { background: var(--bg1); }
.content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* === NOTES AREA === */
.notes-block {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent2);
  border-radius: 4px;
  margin-bottom: 20px;
  overflow: hidden;
}

.notes-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
}

.notes-header-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent2);
  letter-spacing: 1px;
  flex: 1;
}

.notes-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
}

.notes-status-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}

.notes-status-field {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
}

.notes-status-field select,
.notes-status-field input[type="text"] {
  background: var(--bg1);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 6px;
  border-radius: 3px;
  outline: none;
}
.notes-status-field select:focus,
.notes-status-field input[type="text"]:focus { border-color: var(--accent2); }

.notes-textarea {
  width: 100%;
  min-height: 80px;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 12px;
  resize: vertical;
  outline: none;
  line-height: 1.6;
}
.notes-textarea::placeholder { color: var(--text3); }

/* === SECTION === */
.section-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.section-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 2px;
}

.section-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

.section-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
}

/* === LINKS GRID === */
.links-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}

.link-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  overflow: hidden;
}

.link-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}

.link-card:hover {
  border-color: var(--border2);
  background: var(--bg3);
  transform: translateY(-1px);
}
.link-card:hover::before { transform: scaleX(1); }

.link-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}

.link-card-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.link-card-actions {
  display: flex; gap: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
.link-card:hover .link-card-actions { opacity: 1; }

.link-icon-btn {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 2px;
  font-size: 13px;
  border-radius: 2px;
  transition: color 0.15s;
}
.link-icon-btn:hover { color: var(--accent); }

.link-card-url {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.link-card-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 4px;
}

.pinned-badge {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--accent2);
  background: rgba(255,107,53,0.1);
  border: 1px solid rgba(255,107,53,0.3);
  padding: 1px 5px;
  border-radius: 2px;
}

.add-link-card {
  background: none;
  border: 1px dashed var(--border);
  border-radius: 4px;
  padding: 12px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  color: var(--text3);
  font-family: var(--mono);
  font-size: 11px;
  transition: all 0.2s;
  min-height: 80px;
}
.add-link-card:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,229,255,0.03);
}
.add-link-card i { font-size: 18px; }

/* === PINNED SECTION === */
.pinned-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.pin-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: var(--bg2);
  border: 1px solid rgba(255,107,53,0.3);
  border-radius: 3px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
  transition: all 0.15s;
}
.pin-chip:hover { border-color: var(--accent2); color: var(--accent2); }
.pin-chip i { font-size: 13px; color: var(--accent2); }

/* === SEARCH RESULTS === */
.search-results {
  display: none;
  position: absolute;
  top: calc(var(--topbar-h) + 4px);
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  z-index: 200;
  max-height: 300px;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.search-results.show { display: block; }
.search-result-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.search-result-item:hover { background: var(--bg3); }
.search-result-item:last-child { border-bottom: none; }
.search-result-proj { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.search-result-name { font-size: 13px; color: var(--text); font-weight: 600; }
.search-result-url { font-family: var(--mono); font-size: 10px; color: var(--text3); }

/* === MODAL === */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  backdrop-filter: blur(2px);
}
.modal-overlay.show { opacity: 1; pointer-events: all; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  width: 340px;
  max-width: 92vw;
  overflow: hidden;
  transform: translateY(8px) scale(0.98);
  transition: transform 0.2s;
  position: relative;
}
.modal-overlay.show .modal { transform: translateY(0) scale(1); }

.modal-type-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.modal-type-tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  letter-spacing: 1px;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.modal-type-tab:hover { color: var(--text); background: var(--bg3); }
.modal-type-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--bg3);
}

.modal-body { padding: 18px; }

.modal-field { margin-bottom: 14px; }
.modal-field label {
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.modal-field input,
.modal-field select,
.modal-field textarea {
  width: 100%;
  background: var(--bg1);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 8px 10px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.2s;
}
.modal-field input:focus,
.modal-field select:focus,
.modal-field textarea:focus { border-color: var(--accent); box-shadow: 0 0 6px rgba(0,229,255,0.1); }
.modal-field textarea { resize: vertical; min-height: 70px; }

.modal-actions {
  display: flex; gap: 8px;
  justify-content: flex-end;
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  background: var(--bg3);
}

.modal-btn {
  padding: 7px 16px;
  font-family: var(--mono);
  font-size: 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid var(--border2);
  background: none;
  color: var(--text2);
}
.modal-btn:hover { background: var(--bg4); color: var(--text); }
.modal-btn.confirm {
  background: rgba(0,229,255,0.08);
  border-color: var(--accent);
  color: var(--accent);
}
.modal-btn.confirm:hover { background: rgba(0,229,255,0.16); }

/* === TOAST === */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 18px;
  border-radius: 4px;
  z-index: 999;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
  opacity: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
.toast i { font-size: 15px; color: var(--accent); }

/* === KEYBOARD SHORTCUT HINT === */
.kbd {
  font-family: var(--mono);
  font-size: 10px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  padding: 1px 5px;
  border-radius: 2px;
  color: var(--text3);
}

/* === MOBILE === */
@media (max-width: 600px) {
  :root { --sidebar-w: 220px; }
  .sidebar { position: fixed; top: var(--topbar-h); left: 0; bottom: 0; z-index: 100; }
  .sidebar.collapsed { width: 0; }
  .user-tag { display: none; }
  #search-input { width: 140px; }
  #search-input:focus { width: 180px; }
  .links-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .main-actions { flex-wrap: wrap; }
}

/* === SCAN LINE ANIMATION === */
@keyframes scanline {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}
.scanline {
  position: fixed;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(transparent, rgba(0,229,255,0.04), transparent);
  pointer-events: none;
  z-index: 0;
  animation: scanline 8s linear infinite;
  top: 0;
}

/* === GEAR DECORATION === */
@keyframes spin-slow { to { transform: rotate(360deg); } }
@keyframes spin-slow-rev { to { transform: rotate(-360deg); } }
.gear-deco {
  position: fixed;
  opacity: 0.04;
  pointer-events: none;
  z-index: 0;
  color: var(--accent);
  font-size: 120px;
}
.gear1 { bottom: 20px; right: 20px; animation: spin-slow 20s linear infinite; }
.gear2 { top: 60px; right: 160px; font-size: 60px; animation: spin-slow-rev 14s linear infinite; }

/* === EXPORT AREA === */
.export-zone {
  margin-top: 24px;
  padding: 12px;
  border: 1px dashed var(--border);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.export-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
}
</style>
</head>
<body>

<!-- Decorations -->
<div class="scanline"></div>
<div class="corner-mark tl"></div>
<div class="corner-mark tr"></div>
<div class="corner-mark bl"></div>
<div class="corner-mark br"></div>
<i class="ti ti-settings gear-deco gear1" aria-hidden="true"></i>
<i class="ti ti-settings gear-deco gear2" aria-hidden="true"></i>

<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-bracket">[</span>EYC<span class="logo-bracket">]</span> EMPIRE
    </div>

    <div class="topbar-sep"></div>

    <div class="search-wrap" style="position:relative">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="search-input" placeholder="Search... [S]" autocomplete="off">
      <div class="search-results" id="search-results"></div>
    </div>

    <button class="topbar-btn" id="collapse-btn" title="Toggle sidebar [C]">
      <i class="ti ti-layout-sidebar" aria-hidden="true"></i>
    </button>

    <button class="topbar-btn" id="export-btn" title="Export JSON [E]">
      <i class="ti ti-download" aria-hidden="true"></i>
    </button>

    <button class="topbar-btn" id="import-btn" title="Import JSON">
      <i class="ti ti-upload" aria-hidden="true"></i>
    </button>
    <input type="file" id="import-file" accept=".json" style="display:none">

    <div class="user-tag"><i class="ti ti-terminal" aria-hidden="true"></i> <span>Mr. EZ</span></div>
  </div>

  <div class="body">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">

      <div class="sidebar-section-label">PROJECTS</div>
      <div id="projects-nav"></div>

      <button class="sidebar-add-btn" id="add-project-btn">
        <i class="ti ti-plus" aria-hidden="true"></i> New Project
      </button>

      <div class="sidebar-section-label" style="margin-top:8px">TOOLS</div>
      <div id="tools-nav"></div>

      <button class="sidebar-add-btn" id="add-tool-btn">
        <i class="ti ti-plus" aria-hidden="true"></i> New Tool
      </button>

    </div>

    <!-- MAIN -->
    <div class="main">

      <div class="main-header">
        <div class="main-title-block">
          <div class="main-title">
            <span class="main-title-prefix">~/</span>
            <span id="main-title-text">—</span>
          </div>
          <div class="main-subtitle" id="main-subtitle">Select a project</div>
        </div>
        <div class="main-actions">
          <select class="status-select" id="status-select" onchange="setStatus(this.value)">
            <option value="active">● Active</option>
            <option value="progress">◑ In Progress</option>
            <option value="hold">○ On Hold</option>
            <option value="archived">✕ Archived</option>
          </select>
          <button class="action-btn primary" onclick="openModal()">
            <i class="ti ti-plus" aria-hidden="true"></i> Add Link
          </button>
        </div>
      </div>

      <div class="content" id="main-content">
        <div style="text-align:center; padding:60px 20px; color:var(--text3); font-family:var(--mono); font-size:13px;">
          <i class="ti ti-tool" style="font-size:40px; display:block; margin-bottom:12px; opacity:0.3"></i>
          Select a project or tool from the sidebar
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-type-tabs">
      <button class="modal-type-tab active" id="tab-link" onclick="switchTab('link')">
        <i class="ti ti-link" aria-hidden="true"></i> SUB-LINK
      </button>
      <button class="modal-type-tab" id="tab-project" onclick="switchTab('project')">
        <i class="ti ti-folder" aria-hidden="true"></i> PROJECT
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label>NAME</label>
        <input type="text" id="m-name" placeholder="e.g. Admin Panel">
      </div>
      <div class="modal-field" id="m-url-field">
        <label>URL</label>
        <input type="text" id="m-url" placeholder="https://...">
      </div>
      <div class="modal-field" id="m-icon-field">
        <label>ICON (Tabler name)</label>
        <input type="text" id="m-icon" placeholder="e.g. shield, flag, user...">
      </div>
      <div class="modal-field" id="m-notes-field">
        <label>NOTES (optional)</label>
        <textarea id="m-notes" placeholder="Quick note..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="confirmModal()">Add</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <i class="ti ti-check" aria-hidden="true"></i>
  <span id="toast-msg"></span>
</div>

<script>
// ===================== DATA =====================
const DEFAULT_DATA = {
  projects: {
    OPS: {
      icon: 'shield', status: 'active',
      notes: { text: 'Student management system. Multi-role panels.', status: 'active', lastUpdated: Date.now() },
      links: [
        { name: 'OPS', url: 'https://eycempire.github.io/OPS/OPS.html', pinned: false, lastOpened: null },
        { name: 'Admin', url: 'https://eycempire.github.io/OPS/Admin-Panel.html', pinned: true, lastOpened: null },
        { name: 'Assistant', url: 'https://eycempire.github.io/OPS/Assistant-Panel.html', pinned: false, lastOpened: null },
        { name: 'Parent Panel', url: 'https://eycempire.github.io/OPS/Parent-Panel.html', pinned: false, lastOpened: null },
        { name: 'SCE Panel', url: 'https://eycempire.github.io/OPS/SCE-Panel.html', pinned: false, lastOpened: null },
      ]
    },
    Pioneers: {
      icon: 'flag', status: 'progress',
      notes: { text: 'Educational platform with student & teacher hubs.', status: 'progress', lastUpdated: Date.now() },
      links: [
        { name: 'Pioneers', url: 'https://eycempire.github.io/Pioneers/Pio-Hub.html', pinned: false, lastOpened: null },
        { name: 'Admin', url: 'https://eycempire.github.io/Pioneers/Pio-A-Hub.html', pinned: true, lastOpened: null },
        { name: 'Assistant', url: 'https://eycempire.github.io/Pioneers/Pio-Asis-Hub.html', pinned: false, lastOpened: null },
        { name: 'Student', url: 'https://eycempire.github.io/Pioneers/Pio-S-Hub.html', pinned: false, lastOpened: null },
        { name: 'Teacher', url: 'https://eycempire.github.io/Pioneers/Pio-T-Hub.html', pinned: false, lastOpened: null },
      ]
    },
    'SH-Y': {
      icon: 'user', status: 'active',
      notes: { text: 'Shrif Youssry personal site + admin.', status: 'active', lastUpdated: Date.now() },
      links: [
        { name: 'SH=Y', url: 'https://eycempire.github.io/Shrif-Youssry/index.html', pinned: false, lastOpened: null },
        { name: 'Admin', url: 'https://eycempire.github.io/Shrif-Youssry/admin.html', pinned: false, lastOpened: null },
      ]
    },
    Shop: {
      icon: 'shopping-bag', status: 'hold',
      notes: { text: 'E-commerce front. Needs backend integration.', status: 'hold', lastUpdated: Date.now() },
      links: [
        { name: 'Shop', url: 'https://eycempire.github.io/Shop/Shop.html', pinned: false, lastOpened: null },
      ]
    },
    Veto: {
      icon: 'player-play', status: 'active',
      notes: { text: 'Veto project — online & offline versions.', status: 'active', lastUpdated: Date.now() },
      links: [
        { name: 'Veto Offline', url: 'https://eycempire.github.io/Veto/vetoof.html', pinned: false, lastOpened: null },
        { name: 'Veto Online', url: 'https://eycempire.github.io/Veto/VSP.html', pinned: false, lastOpened: null },
      ]
    },
  },
  tools: {
    GitHub: {
      icon: 'brand-github', status: 'active',
      notes: { text: 'Main repos: EYC-Empire, OPS, Pioneers, Shop, Veto, Shrif-Youssry.', status: 'active', lastUpdated: Date.now() },
      links: [
        { name: 'EYC Empire', url: 'https://github.com/eycempire', pinned: true, lastOpened: null },
      ]
    },
    'Google Apps Script': {
      icon: 'brand-google', status: 'active',
      notes: { text: 'Backend automation for Sheets & Forms.', status: 'active', lastUpdated: Date.now() },
      links: [
        { name: 'Apps Script', url: 'https://script.google.com', pinned: false, lastOpened: null },
      ]
    },
    Claude: {
      icon: 'robot', status: 'active',
      notes: { text: 'Primary AI assistant for content & code.', status: 'active', lastUpdated: Date.now() },
      links: [
        { name: 'Claude.ai', url: 'https://claude.ai', pinned: true, lastOpened: null },
      ]
    },
    Gemini: {
      icon: 'stars', status: 'active',
      notes: { text: 'Google Gemini — multimodal tasks.', status: 'active', lastUpdated: Date.now() },
      links: [
        { name: 'Gemini', url: 'https://gemini.google.com', pinned: false, lastOpened: null },
      ]
    },
    ChatGPT: {
      icon: 'message-circle', status: 'active',
      notes: { text: 'OpenAI ChatGPT — code & research.', status: 'active', lastUpdated: Date.now() },
      links: [
        { name: 'ChatGPT', url: 'https://chat.openai.com', pinned: false, lastOpened: null },
      ]
    },
    '11 Labs': {
      icon: 'microphone', status: 'active',
      notes: { text: 'ElevenLabs — voice synthesis & TTS.', status: 'active', lastUpdated: Date.now() },
      links: [
        { name: '11 Labs', url: 'https://elevenlabs.io', pinned: true, lastOpened: null },
      ]
    },
  }
};

// ===================== STATE =====================
let data = load();
let activeSection = 'projects';
let activeKey = 'OPS';
let sidebarOpen = true;
let modalTab = 'link';
let notesTimers = {};

function load() {
  try {
    const s = localStorage.getItem('eyc_empire_v2');
    return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function save() { localStorage.setItem('eyc_empire_v2', JSON.stringify(data)); }

// ===================== RENDER =====================
function renderSidebar() {
  const projNav = document.getElementById('projects-nav');
  const toolsNav = document.getElementById('tools-nav');
  projNav.innerHTML = '';
  toolsNav.innerHTML = '';

  ['projects', 'tools'].forEach(section => {
    const nav = section === 'projects' ? projNav : toolsNav;
    Object.keys(data[section]).forEach(key => {
      const item = data[section][key];
      const el = document.createElement('div');
      el.className = 'nav-item' + (activeSection === section && activeKey === key ? ' active' : '');
      el.innerHTML = `
        <i class="ti ti-${item.icon}" aria-hidden="true"></i>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis">${key}</span>
        <span class="nav-status-dot status-${item.status}"></span>
        <span class="nav-badge">${item.links.length}</span>
      `;
      el.onclick = () => { activeSection = section; activeKey = key; renderAll(); };
      nav.appendChild(el);
    });
  });
}

function renderMain() {
  const section = data[activeSection];
  const item = section ? section[activeKey] : null;

  document.getElementById('main-title-text').textContent = activeKey || '—';
  document.getElementById('main-subtitle').textContent =
    activeSection === 'tools' ? '~/tools/' + activeKey : '~/projects/' + activeKey;
  document.getElementById('status-select').value = item ? item.status : 'active';

  if (!item) return;
  const content = document.getElementById('main-content');
  content.innerHTML = '';

  // Notes block
  const nb = document.createElement('div');
  nb.className = 'notes-block';
  nb.innerHTML = `
    <div class="notes-header">
      <i class="ti ti-file-text" style="font-size:13px;color:var(--accent2)" aria-hidden="true"></i>
      <span class="notes-header-label">NOTES // ${activeKey}</span>
      <span class="notes-meta" id="notes-meta">${formatDate(item.notes.lastUpdated)}</span>
    </div>
    <div class="notes-status-row">
      <div class="notes-status-field">
        <i class="ti ti-activity" style="font-size:12px" aria-hidden="true"></i>
        STATUS:
        <select id="note-status-sel" onchange="updateNoteStatus(this.value)">
          <option value="active" ${item.notes.status==='active'?'selected':''}>Active</option>
          <option value="progress" ${item.notes.status==='progress'?'selected':''}>In Progress</option>
          <option value="hold" ${item.notes.status==='hold'?'selected':''}>On Hold</option>
          <option value="archived" ${item.notes.status==='archived'?'selected':''}>Archived</option>
        </select>
      </div>
    </div>
    <textarea class="notes-textarea" id="notes-ta" placeholder="// Type notes about this repository...">${item.notes.text}</textarea>
  `;
  content.appendChild(nb);

  const ta = nb.querySelector('#notes-ta');
  ta.addEventListener('input', () => {
    clearTimeout(notesTimers[activeKey]);
    notesTimers[activeKey] = setTimeout(() => {
      data[activeSection][activeKey].notes.text = ta.value;
      data[activeSection][activeKey].notes.lastUpdated = Date.now();
      document.getElementById('notes-meta').textContent = 'just now';
      save();
    }, 600);
  });

  // Pinned chips
  const pinned = item.links.filter(l => l.pinned);
  if (pinned.length) {
    const ph = document.createElement('div');
    ph.className = 'section-head';
    ph.innerHTML = `<span class="section-label" style="color:var(--accent2)">PINNED</span><div class="section-line" style="background:rgba(255,107,53,0.2)"></div>`;
    content.appendChild(ph);
    const pr = document.createElement('div');
    pr.className = 'pinned-row';
    pinned.forEach(link => {
      const chip = document.createElement('div');
      chip.className = 'pin-chip';
      chip.innerHTML = `<i class="ti ti-pin" aria-hidden="true"></i>${link.name}`;
      chip.onclick = () => openLink(link);
      pr.appendChild(chip);
    });
    content.appendChild(pr);
  }

  // Links
  const sh = document.createElement('div');
  sh.className = 'section-head';
  sh.style.marginTop = '16px';
  sh.innerHTML = `<span class="section-label">SUB-LINKS</span><div class="section-line"></div><span class="section-count">${item.links.length}</span>`;
  content.appendChild(sh);

  const grid = document.createElement('div');
  grid.className = 'links-grid';

  item.links.forEach((link, idx) => {
    const card = document.createElement('div');
    card.className = 'link-card';
    card.innerHTML = `
      <div class="link-card-top">
        <span class="link-card-name">${link.name}</span>
        <div class="link-card-actions">
          <button class="link-icon-btn" title="Pin" onclick="event.stopPropagation();togglePin(${idx})">
            <i class="ti ${link.pinned?'ti-pin-filled':'ti-pin'}" aria-hidden="true" style="${link.pinned?'color:var(--accent2)':''}"></i>
          </button>
          <button class="link-icon-btn" title="Copy URL" onclick="event.stopPropagation();copyUrl('${link.url}')">
            <i class="ti ti-copy" aria-hidden="true"></i>
          </button>
          <button class="link-icon-btn" title="Delete" onclick="event.stopPropagation();deleteLink(${idx})" style="color:var(--text3)">
            <i class="ti ti-trash" aria-hidden="true"></i>
          </button>
        </div>
      </div>
      <div class="link-card-url">${link.url.replace('https://','')}</div>
      <div class="link-card-meta">
        <i class="ti ti-clock" style="font-size:11px" aria-hidden="true"></i>
        ${link.lastOpened ? timeAgo(link.lastOpened) : 'never opened'}
        ${link.pinned ? '<span class="pinned-badge">PINNED</span>' : ''}
      </div>
    `;
    card.onclick = () => openLink(link, idx);
    grid.appendChild(card);
  });

  const addCard = document.createElement('div');
  addCard.className = 'add-link-card';
  addCard.innerHTML = `<i class="ti ti-plus" aria-hidden="true"></i><span>Add sub-link</span>`;
  addCard.onclick = () => openModal();
  grid.appendChild(addCard);
  content.appendChild(grid);

  // Export zone
  const ez = document.createElement('div');
  ez.className = 'export-zone';
  ez.innerHTML = `
    <span class="export-label"><i class="ti ti-database" style="font-size:13px;vertical-align:-2px" aria-hidden="true"></i>  All data stored in browser (localStorage)</span>
    <div style="display:flex;gap:8px">
      <button class="action-btn" onclick="exportJSON()"><i class="ti ti-download" aria-hidden="true"></i> Export JSON</button>
    </div>
  `;
  content.appendChild(ez);
}

function renderAll() { renderSidebar(); renderMain(); }

// ===================== ACTIONS =====================
function openLink(link, idx) {
  if (idx !== undefined) {
    data[activeSection][activeKey].links[idx].lastOpened = Date.now();
    save();
  }
  window.open(link.url, '_blank');
}

function togglePin(idx) {
  data[activeSection][activeKey].links[idx].pinned = !data[activeSection][activeKey].links[idx].pinned;
  save(); renderMain();
}

function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => toast('URL copied to clipboard'));
}

function deleteLink(idx) {
  data[activeSection][activeKey].links.splice(idx, 1);
  save(); renderMain();
  toast('Link removed');
}

function setStatus(val) {
  if (!data[activeSection][activeKey]) return;
  data[activeSection][activeKey].status = val;
  save(); renderSidebar();
}

function updateNoteStatus(val) {
  data[activeSection][activeKey].notes.status = val;
  save();
}

// ===================== SIDEBAR TOGGLE =====================
document.getElementById('collapse-btn').onclick = () => {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
};

// ===================== MODAL =====================
function openModal(tab) {
  switchTab(tab || 'link');
  document.getElementById('m-name').value = '';
  document.getElementById('m-url').value = '';
  document.getElementById('m-icon').value = '';
  document.getElementById('m-notes').value = '';
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(() => document.getElementById('m-name').focus(), 200);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

function switchTab(tab) {
  modalTab = tab;
  document.getElementById('tab-link').classList.toggle('active', tab === 'link');
  document.getElementById('tab-project').classList.toggle('active', tab === 'project');
  document.getElementById('m-url-field').style.display = tab === 'link' ? '' : 'none';
  document.getElementById('m-icon-field').style.display = tab === 'project' ? '' : 'none';
  document.getElementById('m-notes-field').style.display = '';
}

function confirmModal() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { document.getElementById('m-name').focus(); return; }

  if (modalTab === 'link') {
    const url = document.getElementById('m-url').value.trim();
    if (!url) { document.getElementById('m-url').focus(); return; }
    const notes = document.getElementById('m-notes').value.trim();
    data[activeSection][activeKey].links.push({ name, url, pinned: false, lastOpened: null, notes });
    toast('Sub-link added');
  } else {
    const icon = document.getElementById('m-icon').value.trim() || 'folder';
    const notes = document.getElementById('m-notes').value.trim();
    const target = modalTab === 'project' ? 'projects' : 'tools';
    if (data[target][name]) { toast('Name already exists'); closeModal(); return; }
    data[target][name] = {
      icon, status: 'active',
      notes: { text: notes, status: 'active', lastUpdated: Date.now() },
      links: []
    };
    activeSection = target; activeKey = name;
    toast('Project added');
  }
  save(); closeModal(); renderAll();
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// Add project / tool buttons
document.getElementById('add-project-btn').onclick = () => { switchTab = (t) => {}; openModal('project'); switchTab = switchTabFn; };
document.getElementById('add-tool-btn').onclick = () => openModal('project');

// Fix switchTab ref
const switchTabFn = switchTab;

// ===================== SEARCH =====================
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { searchResults.classList.remove('show'); return; }
  const results = [];
  ['projects','tools'].forEach(section => {
    Object.keys(data[section]).forEach(key => {
      data[section][key].links.forEach((link, idx) => {
        if (link.name.toLowerCase().includes(q) || key.toLowerCase().includes(q)) {
          results.push({ section, key, link, idx });
        }
      });
    });
  });
  if (!results.length) {
    searchResults.innerHTML = `<div style="padding:14px;font-family:var(--mono);font-size:12px;color:var(--text3);text-align:center">No results</div>`;
  } else {
    searchResults.innerHTML = results.slice(0,8).map((r,i) => `
      <div class="search-result-item" onclick="goResult(${i})">
        <div>
          <div class="search-result-proj">${r.section.toUpperCase()} / ${r.key}</div>
          <div class="search-result-name">${r.link.name}</div>
          <div class="search-result-url">${r.link.url.replace('https://','')}</div>
        </div>
        <i class="ti ti-external-link" style="color:var(--text3);font-size:13px;margin-left:auto" aria-hidden="true"></i>
      </div>
    `).join('');
    searchResults._results = results;
  }
  searchResults.classList.add('show');
});

window.goResult = function(i) {
  const r = searchResults._results[i];
  activeSection = r.section; activeKey = r.key;
  searchInput.value = '';
  searchResults.classList.remove('show');
  renderAll();
  setTimeout(() => openLink(r.link, r.idx), 100);
};

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) searchResults.classList.remove('show');
});

// ===================== EXPORT / IMPORT =====================
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'eyc-empire-backup.json';
  a.click();
  toast('Data exported as JSON');
}

document.getElementById('export-btn').onclick = exportJSON;
document.getElementById('import-btn').onclick = () => document.getElementById('import-file').click();
document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      data = JSON.parse(evt.target.result);
      save(); renderAll();
      toast('Data imported successfully');
    } catch { toast('Invalid JSON file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ===================== KEYBOARD SHORTCUTS =====================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  const projKeys = Object.keys(data.projects);
  const toolKeys = Object.keys(data.tools);
  if (e.key === 's' || e.key === 'S') { searchInput.focus(); e.preventDefault(); return; }
  if (e.key === 'c' || e.key === 'C') { document.getElementById('collapse-btn').click(); return; }
  if (e.key === 'n' || e.key === 'N') { openModal('link'); return; }
  if (e.key === 'e' || e.key === 'E') { exportJSON(); return; }
  if (e.key === 'Escape') { closeModal(); searchResults.classList.remove('show'); return; }
  const num = parseInt(e.key);
  if (num >= 1 && num <= projKeys.length) {
    activeSection = 'projects'; activeKey = projKeys[num-1]; renderAll();
  }
});

// ===================== TOAST =====================
function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===================== HELPERS =====================
function formatDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'2-digit' });
}
function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

// ===================== INIT =====================
switchTab('link');
renderAll();
</script>
