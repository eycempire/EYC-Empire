<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EYC Empire — Workshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg0:#0a0c0f;--bg1:#0f1217;--bg2:#151820;--bg3:#1c2030;--bg4:#232840;
  --border:#2a3050;--border2:#3a4570;
  --accent:#00e5ff;--accent2:#ff6b35;--accent3:#7fff00;
  --text:#c8d4e8;--text2:#7a8aaa;--text3:#4a5570;
  --mono:'Share Tech Mono',monospace;--sans:'Exo 2',sans-serif;
  --red:#ff4444;--amber:#ffaa00;--green:#00ff88;
  --sidebar-w:240px;--topbar-h:52px;--action-panel-w:0px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg0);color:var(--text);font-family:var(--sans);font-size:14px;}
::-webkit-scrollbar{width:0;height:0;}

/* Grid bg */
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}

/* Corner marks */
.cm{position:fixed;width:20px;height:20px;border-color:var(--accent);border-style:solid;opacity:.3;z-index:1;pointer-events:none;}
.cm.tl{top:8px;left:8px;border-width:2px 0 0 2px;}
.cm.tr{top:8px;right:8px;border-width:2px 2px 0 0;}
.cm.bl{bottom:8px;left:8px;border-width:0 0 2px 2px;}
.cm.br{bottom:8px;right:8px;border-width:0 2px 2px 0;}

/* Scan line */
@keyframes scanline{0%{transform:translateY(-100%);}100%{transform:translateY(100vh);}}
.scanline{position:fixed;left:0;right:0;height:2px;
  background:linear-gradient(transparent,rgba(0,229,255,.04),transparent);
  pointer-events:none;z-index:0;animation:scanline 8s linear infinite;top:0;}

/* Gears */
@keyframes spin-slow{to{transform:rotate(360deg);}}
@keyframes spin-rev{to{transform:rotate(-360deg);}}
.gear-deco{position:fixed;opacity:.04;pointer-events:none;z-index:0;color:var(--accent);font-size:120px;}
.gear1{bottom:20px;right:20px;animation:spin-slow 20s linear infinite;}
.gear2{top:60px;right:160px;font-size:60px;animation:spin-rev 14s linear infinite;}

/* ── APP LAYOUT ── */
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;}

/* TOPBAR */
.topbar{height:var(--topbar-h);background:var(--bg1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0;position:relative;}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.4;}

.logo-img{height:36px;width:36px;object-fit:contain;border-radius:4px;flex-shrink:0;}

.logo-text{font-family:var(--mono);font-size:14px;color:var(--accent);letter-spacing:2px;
  display:flex;align-items:center;gap:6px;white-space:nowrap;}
.logo-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;
  animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 4px var(--accent);}50%{opacity:.4;box-shadow:none;}}
.logo-bracket{color:var(--text3);}

.topbar-sep{flex:1;}

.search-wrap{position:relative;display:flex;align-items:center;}
.search-wrap i{position:absolute;left:10px;color:var(--text3);font-size:15px;pointer-events:none;}
#search-input{background:var(--bg2);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:13px;padding:6px 10px 6px 32px;border-radius:4px;
  width:180px;transition:all .2s;outline:none;}
#search-input:focus{border-color:var(--accent);box-shadow:0 0 8px rgba(0,229,255,.15);width:240px;}
#search-input::placeholder{color:var(--text3);}

.search-results{display:none;position:absolute;top:calc(100% + 6px);left:0;width:360px;
  background:var(--bg2);border:1px solid var(--border2);border-radius:4px;z-index:200;
  max-height:280px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.search-results.show{display:block;}
.sr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;
  border-bottom:1px solid var(--border);transition:background .15s;}
.sr-item:hover{background:var(--bg3);}
.sr-item:last-child{border-bottom:none;}
.sr-proj{font-family:var(--mono);font-size:10px;color:var(--text3);}
.sr-name{font-size:13px;color:var(--text);font-weight:600;}
.sr-url{font-family:var(--mono);font-size:10px;color:var(--text3);}

.tbtn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);
  padding:6px 10px;border-radius:4px;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;
  font-family:var(--mono);font-size:12px;white-space:nowrap;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--bg3);}
.tbtn i{font-size:15px;}

.user-tag{font-family:var(--mono);font-size:11px;color:var(--text3);
  display:flex;align-items:center;gap:5px;}
.user-tag span{color:var(--accent2);}

/* BODY */
.body{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--bg1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;
  transition:width .3s cubic-bezier(.4,0,.2,1),opacity .3s;}
.sidebar.collapsed{width:0;opacity:0;overflow:hidden;}

.sec-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:2px;
  padding:14px 14px 6px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;
  transition:all .15s;border-left:2px solid transparent;font-size:13px;
  color:var(--text2);white-space:nowrap;overflow:hidden;position:relative;}
.nav-item:hover{background:var(--bg2);color:var(--text);}
.nav-item.active{background:var(--bg3);color:var(--accent);border-left-color:var(--accent);font-weight:600;}
.nav-item i{font-size:16px;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--bg4);border:1px solid var(--border2);
  color:var(--text3);font-family:var(--mono);font-size:10px;padding:1px 6px;
  border-radius:2px;flex-shrink:0;}
.nav-item.active .nav-badge{border-color:var(--accent);color:var(--accent);}

/* Status lamp */
.lamp{width:8px;height:8px;border-radius:50%;flex-shrink:0;position:relative;transition:all .4s;}
.lamp.active  {background:var(--green);box-shadow:0 0 6px var(--green),0 0 12px rgba(0,255,136,.4);}
.lamp.progress{background:var(--amber);box-shadow:0 0 6px var(--amber);}
.lamp.hold    {background:var(--text3);}
.lamp.archived{background:var(--red);opacity:.5;}
@keyframes lamp-pulse{0%,100%{box-shadow:0 0 6px var(--green),0 0 12px rgba(0,255,136,.4);}
  50%{box-shadow:0 0 10px var(--green),0 0 20px rgba(0,255,136,.6);}}
.lamp.active{animation:lamp-pulse 2s ease-in-out infinite;}

.sidebar-add{margin:6px 10px;padding:8px 12px;border:1px dashed var(--border2);
  background:none;color:var(--text3);font-family:var(--mono);font-size:12px;
  border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all .2s;width:calc(100% - 20px);}
.sidebar-add:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.04);}

/* ACTION PANEL (right of sidebar, left of main) */
.action-panel{width:0;background:var(--bg1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
  transition:width .3s cubic-bezier(.4,0,.2,1);}
.action-panel.open{width:220px;}

.ap-header{padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ap-title{font-family:var(--mono);font-size:11px;color:var(--accent2);letter-spacing:1px;flex:1;}
.ap-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;
  display:flex;align-items:center;transition:color .15s;}
.ap-close:hover{color:var(--accent);}

.ap-context{padding:8px 14px;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:10px;color:var(--text3);}
.ap-context span{color:var(--accent);}

.ap-list{flex:1;overflow-y:auto;padding:8px 0;}

.ap-action{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;
  cursor:pointer;border-left:2px solid transparent;transition:all .15s;}
.ap-action:hover{background:var(--bg2);border-left-color:var(--border2);}
.ap-action.pinned-action{border-left-color:var(--accent2);}

.ap-action-icon{width:26px;height:26px;border-radius:4px;background:var(--bg3);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text2);flex-shrink:0;margin-top:1px;}
.ap-action-body{flex:1;min-width:0;}
.ap-action-name{font-size:12px;color:var(--text);font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ap-action-type{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px;}
.ap-action-last{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:2px;}
.ap-action-btns{display:flex;gap:4px;opacity:0;transition:opacity .15s;margin-top:4px;}
.ap-action:hover .ap-action-btns{opacity:1;}
.ap-mini-btn{background:none;border:1px solid var(--border);color:var(--text3);
  font-size:11px;padding:2px 6px;border-radius:2px;cursor:pointer;font-family:var(--mono);
  transition:all .15s;}
.ap-mini-btn:hover{border-color:var(--accent);color:var(--accent);}
.ap-mini-btn.danger:hover{border-color:var(--red);color:var(--red);}

.ap-add{margin:8px 10px;padding:7px 12px;border:1px dashed var(--border2);
  background:none;color:var(--text3);font-family:var(--mono);font-size:11px;
  border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all .2s;width:calc(100% - 20px);}
.ap-add:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(255,107,53,.04);}

.ap-empty{padding:24px 14px;text-align:center;font-family:var(--mono);
  font-size:11px;color:var(--text3);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.main-header{padding:12px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;background:var(--bg1);flex-shrink:0;}
.main-title-block{flex:1;min-width:0;}
.main-title{font-family:var(--mono);font-size:16px;color:var(--accent);
  letter-spacing:1px;display:flex;align-items:center;gap:10px;}
.main-title-prefix{color:var(--text3);font-size:13px;}
.main-subtitle{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono);}
.status-sel{background:var(--bg2);border:1px solid var(--border);color:var(--text2);
  font-family:var(--mono);font-size:11px;padding:4px 8px;border-radius:3px;cursor:pointer;outline:none;}
.status-sel:focus{border-color:var(--accent);}
.main-actions{display:flex;align-items:center;gap:8px;}
.action-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;
  background:var(--bg2);border:1px solid var(--border2);color:var(--text2);
  font-family:var(--mono);font-size:12px;border-radius:4px;cursor:pointer;
  transition:all .2s;white-space:nowrap;}
.action-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--bg3);}
.action-btn.primary{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.06);}
.action-btn.primary:hover{background:rgba(0,229,255,.12);}
.action-btn.orange{border-color:var(--accent2);color:var(--accent2);background:rgba(255,107,53,.06);}
.action-btn.orange:hover{background:rgba(255,107,53,.12);}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:18px 20px;}

/* PROMPT PANEL (full-height, beside sidebar) */
.prompt-panel{width:0;background:var(--bg1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .3s cubic-bezier(.4,0,.2,1);}
.prompt-panel.open{width:calc(100vw - var(--sidebar-w) - 4px);}
.prompt-panel.open.with-actions{width:calc(100vw - var(--sidebar-w) - 220px - 4px);}

.pp-header{height:var(--topbar-h);background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.pp-title{font-family:var(--mono);font-size:13px;color:var(--accent2);letter-spacing:1px;flex:1;}

.pp-font-ctrl{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--text3);}
.pp-font-ctrl button{background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  width:24px;height:24px;border-radius:3px;cursor:pointer;font-family:var(--mono);
  font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.pp-font-ctrl button:hover{border-color:var(--accent);color:var(--accent);}
.pp-font-size{width:32px;text-align:center;color:var(--text);}

.pp-dir-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  padding:4px 10px;border-radius:3px;cursor:pointer;font-family:var(--mono);font-size:11px;
  transition:all .15s;}
.pp-dir-btn:hover,.pp-dir-btn.active{border-color:var(--accent);color:var(--accent);}

.pp-body{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;overflow:hidden;}
.pp-textarea{flex:1;background:var(--bg0);border:1px solid var(--border);
  color:var(--text);font-family:var(--mono);font-size:16px;padding:16px;
  border-radius:6px;resize:none;outline:none;line-height:1.8;
  transition:border-color .2s,font-size .15s;}
.pp-textarea:focus{border-color:var(--accent2);box-shadow:0 0 12px rgba(255,107,53,.1);}
.pp-textarea[dir="rtl"]{text-align:right;}

.pp-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pp-btn{display:flex;align-items:center;gap:6px;padding:9px 18px;
  border-radius:4px;cursor:pointer;font-family:var(--mono);font-size:13px;
  transition:all .2s;border:1px solid;}
.pp-btn.copy{background:rgba(0,229,255,.08);border-color:var(--accent);color:var(--accent);}
.pp-btn.copy:hover{background:rgba(0,229,255,.18);}
.pp-btn.paste{background:rgba(255,107,53,.08);border-color:var(--accent2);color:var(--accent2);}
.pp-btn.paste:hover{background:rgba(255,107,53,.18);}
.pp-btn.clear{background:none;border-color:var(--border2);color:var(--text3);}
.pp-btn.clear:hover{border-color:var(--red);color:var(--red);}
.pp-char-count{font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto;}

/* NOTES BLOCK */
.notes-block{background:var(--bg2);border:1px solid var(--border);
  border-left:3px solid var(--accent2);border-radius:4px;margin-bottom:18px;}
.notes-header{display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-bottom:1px solid var(--border);background:var(--bg3);}
.notes-header-label{font-family:var(--mono);font-size:11px;color:var(--accent2);letter-spacing:1px;flex:1;}
.notes-meta{font-family:var(--mono);font-size:10px;color:var(--text3);}
.notes-status-row{display:flex;align-items:center;gap:12px;padding:8px 12px;
  border-bottom:1px solid var(--border);}
.nsf{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--text3);}
.nsf select{background:var(--bg1);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:11px;padding:3px 6px;border-radius:3px;outline:none;}
.nsf select:focus{border-color:var(--accent2);}
.notes-ta{width:100%;min-height:80px;background:transparent;border:none;
  color:var(--text);font-family:var(--mono);font-size:13px;padding:12px;
  resize:vertical;outline:none;line-height:1.6;}
.notes-ta::placeholder{color:var(--text3);}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sec-head-label{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:2px;}
.sec-head-line{flex:1;height:1px;background:var(--border);}
.sec-head-count{font-family:var(--mono);font-size:11px;color:var(--text3);}

/* LINKS GRID */
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:22px;}
.link-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;
  padding:12px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;
  gap:8px;position:relative;overflow:hidden;}
.link-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--accent);transform:scaleX(0);transform-origin:left;
  transition:transform .25s cubic-bezier(.4,0,.2,1);}
.link-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px);}
.link-card:hover::before{transform:scaleX(1);}
.lc-top{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.lc-name{font-size:13px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.lc-actions{display:flex;gap:4px;opacity:0;transition:opacity .2s;}
.link-card:hover .lc-actions{opacity:1;}
.lc-btn{background:none;border:none;color:var(--text3);cursor:pointer;
  padding:2px;font-size:13px;border-radius:2px;transition:color .15s;}
.lc-btn:hover{color:var(--accent);}
.lc-url{font-family:var(--mono);font-size:10px;color:var(--text3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lc-meta{font-family:var(--mono);font-size:10px;color:var(--text3);
  display:flex;align-items:center;gap:4px;}
.pinned-badge{font-family:var(--mono);font-size:9px;color:var(--accent2);
  background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);
  padding:1px 5px;border-radius:2px;}
.add-link-card{background:none;border:1px dashed var(--border);border-radius:4px;
  padding:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:6px;color:var(--text3);font-family:var(--mono);
  font-size:11px;transition:all .2s;min-height:80px;}
.add-link-card:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.03);}
.add-link-card i{font-size:18px;}

/* PINNED CHIPS */
.pinned-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.pin-chip{display:flex;align-items:center;gap:6px;padding:5px 10px;
  background:var(--bg2);border:1px solid rgba(255,107,53,.3);border-radius:3px;
  cursor:pointer;font-family:var(--mono);font-size:12px;color:var(--text2);transition:all .15s;}
.pin-chip:hover{border-color:var(--accent2);color:var(--accent2);}
.pin-chip i{font-size:13px;color:var(--accent2);}

/* EXPORT ZONE */
.export-zone{margin-top:22px;padding:12px;border:1px dashed var(--border);
  border-radius:4px;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;}
.export-label{font-family:var(--mono);font-size:11px;color:var(--text3);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px);}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;
  width:360px;max-width:94vw;overflow:hidden;
  transform:translateY(8px) scale(.98);transition:transform .2s;}
.modal-overlay.show .modal{transform:translateY(0) scale(1);}

.modal-tabs{display:flex;border-bottom:1px solid var(--border);}
.modal-tab{flex:1;padding:11px;text-align:center;font-family:var(--mono);font-size:11px;
  color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;letter-spacing:1px;background:none;
  border-top:none;border-left:none;border-right:none;}
.modal-tab:hover{color:var(--text);background:var(--bg3);}
.modal-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg3);}
.modal-tab.orange.active{color:var(--accent2);border-bottom-color:var(--accent2);}

.modal-body{padding:18px;}
.mf{margin-bottom:14px;}
.mf label{display:block;font-family:var(--mono);font-size:11px;color:var(--text3);
  letter-spacing:1px;margin-bottom:6px;}
.mf input,.mf select,.mf textarea{width:100%;background:var(--bg1);
  border:1px solid var(--border2);color:var(--text);font-family:var(--mono);
  font-size:13px;padding:8px 10px;border-radius:4px;outline:none;transition:border-color .2s;}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--accent);box-shadow:0 0 6px rgba(0,229,255,.1);}
.mf textarea{resize:vertical;min-height:70px;}

.modal-actions{display:flex;gap:8px;justify-content:flex-end;
  padding:12px 18px;border-top:1px solid var(--border);background:var(--bg3);}
.mbtn{padding:7px 16px;font-family:var(--mono);font-size:12px;border-radius:4px;
  cursor:pointer;transition:all .15s;border:1px solid var(--border2);
  background:none;color:var(--text2);}
.mbtn:hover{background:var(--bg4);color:var(--text);}
.mbtn.confirm{background:rgba(0,229,255,.08);border-color:var(--accent);color:var(--accent);}
.mbtn.confirm:hover{background:rgba(0,229,255,.16);}
.mbtn.orange{background:rgba(255,107,53,.08);border-color:var(--accent2);color:var(--accent2);}
.mbtn.orange:hover{background:rgba(255,107,53,.16);}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  font-family:var(--mono);font-size:12px;padding:8px 18px;border-radius:4px;
  z-index:999;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;
  opacity:0;display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.4);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast i{font-size:15px;color:var(--accent);}

/* Mobile */
@media(max-width:640px){
  :root{--sidebar-w:200px;}
  .sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;z-index:100;}
  .sidebar.collapsed{width:0;}
  .user-tag{display:none;}
  #search-input{width:120px;}
  #search-input:focus{width:160px;}
  .links-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
  .prompt-panel.open{width:100vw;}
}
</style>

    <div class="sec-label" style="margin-top:6px">TOOLS</div>
    <div id="tools-nav"></div>
    <button class="sidebar-add" id="add-tool-btn"><i class="ti ti-plus" aria-hidden="true"></i> New Tool</button>
  </div>

  <!-- ACTION PANEL -->
  <div class="action-panel" id="action-panel">
    <div class="ap-header">
      <span class="ap-title">ACTIONS</span>
      <button class="ap-close" id="ap-close-btn"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="ap-context" id="ap-context">Select project &amp; tool</div>
    <div class="ap-list" id="ap-list"></div>
    <button class="ap-add" id="ap-add-btn"><i class="ti ti-plus" aria-hidden="true"></i> New Action</button>
  </div>

  <!-- PROMPT PANEL -->
  <div class="prompt-panel" id="prompt-panel">
    <div class="pp-header">
      <span class="pp-title">// PROMPT WORKSPACE</span>
      <div class="pp-font-ctrl">
        <button onclick="changeFontSize(-2)">A-</button>
        <span class="pp-font-size" id="pp-font-size-label">16</span>
        <button onclick="changeFontSize(2)">A+</button>
      </div>
      <button class="pp-dir-btn" id="pp-dir-btn" onclick="toggleDir()">RTL</button>
      <button class="ap-close" onclick="closePromptPanel()"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="pp-body">
      <textarea class="pp-textarea" id="pp-textarea" placeholder="// Write your prompt here...&#10;// Supports Arabic and English&#10;&#10;Use {{project}} for current project name&#10;Use {{tool}} for current tool name&#10;Use {{date}} for today's date"></textarea>

        <button class="pp-btn copy" onclick="ppCopy()"><i class="ti ti-copy" aria-hidden="true"></i> Copy</button>
        <button class="pp-btn paste" onclick="ppPaste()"><i class="ti ti-clipboard" aria-hidden="true"></i> Paste</button>
        <button class="pp-btn clear" onclick="ppClear()"><i class="ti ti-trash" aria-hidden="true"></i> Clear</button>
        <span class="pp-char-count" id="pp-char-count">0 chars</span>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main-area">
    <div class="main-header">
      <div class="main-title-block">
        <div class="main-title">

          <span id="main-title-text">—</span>

          <option value="progress">◑ In Progress</option>
          <option value="hold">○ On Hold</option>
          <option value="archived">✕ Archived</option>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const GAS_URL = 'YOUR_WEB_APP_URL_HERE';
const USE_BACKEND = GAS_URL !== 'YOUR_WEB_APP_URL_HERE';

// ── DEFAULT DATA ─────────────────────────────────────────────
const DEFAULT_DATA = {

      links:[{name:'Apps Script',url:'https://script.google.com',pinned:false,lastOpened:null}],actions:{}},

      notes:{text:'Primary AI assistant for content & code.',status:'active',lastUpdated:Date.now()},
      links:[{name:'Claude.ai',url:'https://claude.ai',pinned:true,lastOpened:null}],actions:{}},

      links:[{name:'Gemini',url:'https://gemini.google.com',pinned:false,lastOpened:null}],actions:{}},
    ChatGPT:{icon:'message-circle',status:'active',
      notes:{text:'OpenAI ChatGPT — code & research.',status:'active',lastUpdated:Date.now()},
      links:[{name:'ChatGPT',url:'https://chat.openai.com',pinned:false,lastOpened:null}],actions:{}},
    '11 Labs':{icon:'microphone',status:'active',
      notes:{text:'ElevenLabs — voice synthesis & TTS.',status:'active',lastUpdated:Date.now()},
      links:[{name:'11 Labs',url:'https://elevenlabs.io',pinned:true,lastOpened:null}],actions:{}},
  }

// ── STATE ────────────────────────────────────────────────────
let data = JSON.parse(JSON.stringify(DEFAULT_DATA));
let activeSection = 'projects';
let activeKey = 'OPS';
let activeTool = null;          // for action panel context
let sidebarOpen = true;
let actionPanelOpen = false;
let promptPanelOpen = false;
let modalTab = 'link';
let notesTimers = {};
let syncTimer = null;
let ppFontSize = 16;
let ppDir = 'ltr';

// ── BACKEND ──────────────────────────────────────────────────
async function apiGet(params={}){
  const url=new URL(GAS_URL);
  Object.keys(params).forEach(k=>url.searchParams.set(k,params[k]));
  const r=await fetch(url.toString());
  const j=await r.json();
  if(!j.ok)throw new Error(j.error);
  return j.data;
}
async function apiPost(body){
  const r=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const j=await r.json();
  if(!j.ok)throw new Error(j.error);
  return j.data;
}

async function loadData(){
  try{
    const cached=localStorage.getItem('eyc_empire_v3');
    if(cached){data=JSON.parse(cached);migrateData();renderAll();}
  }catch(e){}
  if(!USE_BACKEND){if(!localStorage.getItem('eyc_empire_v3'))renderAll();setSyncStatus('local');return;}
  setSyncStatus('syncing');
  try{
    const remote=await apiGet({action:'get_all'});
    if(remote&&remote.projects){
      data=remote;migrateData();
      localStorage.setItem('eyc_empire_v3',JSON.stringify(data));
      renderAll();setSyncStatus('synced');
    }else{
      await apiPost({action:'save_all',value:data});setSyncStatus('synced');
    }
  }catch(err){setSyncStatus('offline');console.warn('Backend:',err.message);}
}

function migrateData(){
  // ensure actions field exists on all items
  ['projects','tools'].forEach(sec=>{
    Object.keys(data[sec]||{}).forEach(k=>{
      if(!data[sec][k].actions)data[sec][k].actions={};
    });
  });
}

function save(){
  localStorage.setItem('eyc_empire_v3',JSON.stringify(data));
  if(!USE_BACKEND)return;
  clearTimeout(syncTimer);setSyncStatus('pending');
  syncTimer=setTimeout(pushBackend,1500);
}

// Auto-save notes every 30s
setInterval(()=>{if(USE_BACKEND)pushBackend();},30000);

async function pushBackend(){
  setSyncStatus('syncing');
  try{await apiPost({action:'save_all',value:data});setSyncStatus('synced');}
  catch(err){setSyncStatus('offline');}
}

function setSyncStatus(state){
  const el=document.getElementById('sync-indicator');if(!el)return;
  const map={
    local:   {icon:'ti-database',     color:'var(--text3)',  label:'Local'},
    syncing: {icon:'ti-refresh',      color:'var(--amber)',  label:'Syncing'},
    synced:  {icon:'ti-cloud-check',  color:'var(--green)',  label:'Synced'},
    pending: {icon:'ti-cloud-upload', color:'var(--accent)', label:'Saving'},
    offline: {icon:'ti-cloud-off',    color:'var(--red)',    label:'Offline'},
  };
  const s=map[state]||map.local;
  el.innerHTML=`<i class="ti ${s.icon}" style="color:${s.color};font-size:14px"></i><span style="color:${s.color}">${s.label}</span>`;
}

// ── RENDER SIDEBAR ────────────────────────────────────────────
function renderSidebar(){
  ['projects','tools'].forEach(sec=>{
    const nav=document.getElementById(sec===('projects')?'projects-nav':'tools-nav');
    nav.innerHTML='';
    Object.keys(data[sec]||{}).forEach(key=>{
      const item=data[sec][key];
      const el=document.createElement('div');
      el.className='nav-item'+(activeSection===sec&&activeKey===key?' active':'');
      el.innerHTML=`
        <i class="ti ti-${item.icon}"></i>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis">${key}</span>
        <span class="lamp ${item.status}" title="${item.status}"></span>
        <span class="nav-badge">${item.links.length}</span>`;
      el.onclick=()=>{activeSection=sec;activeKey=key;renderAll();};
      nav.appendChild(el);
    });
  });
}

// ── RENDER MAIN ───────────────────────────────────────────────
function renderMain(){
  const item=data[activeSection]?.[activeKey];
  document.getElementById('main-title-text').textContent=activeKey||'—';
  document.getElementById('main-subtitle').textContent=`~/${activeSection}/${activeKey}`;
  document.getElementById('status-select').value=item?.status||'active';
  const content=document.getElementById('main-content');
  content.innerHTML='';
  if(!item)return;

  // Notes
  const nb=document.createElement('div');nb.className='notes-block';
  nb.innerHTML=`
    <div class="notes-header">
      <i class="ti ti-file-text" style="font-size:13px;color:var(--accent2)"></i>
      <span class="notes-header-label">NOTES // ${activeKey}</span>
      <span class="notes-meta" id="notes-meta">${fmtDate(item.notes.lastUpdated)}</span>
    </div>
    <div class="notes-status-row">
      <div class="nsf"><i class="ti ti-activity" style="font-size:12px"></i> STATUS:
        <select onchange="updateNoteStatus(this.value)">
          ${['active','progress','hold','archived'].map(s=>`<option value="${s}" ${item.notes.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>
    <textarea class="notes-ta" id="notes-ta" placeholder="// Notes about this repository...">${item.notes.text||''}</textarea>`;
  content.appendChild(nb);

  const ta=nb.querySelector('#notes-ta');
  ta.addEventListener('input',()=>{
    clearTimeout(notesTimers[activeKey]);
    notesTimers[activeKey]=setTimeout(()=>{
      data[activeSection][activeKey].notes.text=ta.value;
      data[activeSection][activeKey].notes.lastUpdated=Date.now();
      const m=document.getElementById('notes-meta');
      if(m)m.textContent='saved';
      save();
    },600);
  });

  // Pinned
  const pinned=item.links.filter(l=>l.pinned);
  if(pinned.length){
    const ph=document.createElement('div');ph.className='sec-head';
    ph.innerHTML=`<span class="sec-head-label" style="color:var(--accent2)">PINNED</span><div class="sec-head-line" style="background:rgba(255,107,53,.2)"></div>`;
    content.appendChild(ph);
    const pr=document.createElement('div');pr.className='pinned-row';
    pinned.forEach(link=>{
      const c=document.createElement('div');c.className='pin-chip';
      c.innerHTML=`<i class="ti ti-pin"></i>${link.name}`;
      c.onclick=()=>openLink(link);pr.appendChild(c);
    });
    content.appendChild(pr);
  }

  // Links
  const sh=document.createElement('div');sh.className='sec-head';sh.style.marginTop='16px';
  sh.innerHTML=`<span class="sec-head-label">SUB-LINKS</span><div class="sec-head-line"></div><span class="sec-head-count">${item.links.length}</span>`;
  content.appendChild(sh);

  const grid=document.createElement('div');grid.className='links-grid';
  item.links.forEach((link,idx)=>{
    const card=document.createElement('div');card.className='link-card';
    card.innerHTML=`
      <div class="lc-top">
        <span class="lc-name">${link.name}</span>
        <div class="lc-actions">
          <button class="lc-btn" title="Pin" onclick="event.stopPropagation();togglePin(${idx})">
            <i class="ti ${link.pinned?'ti-pin-filled':'ti-pin'}" style="${link.pinned?'color:var(--accent2)':''}"></i>
          </button>
          <button class="lc-btn" title="Copy" onclick="event.stopPropagation();copyUrl('${link.url}')">
            <i class="ti ti-copy"></i>
          </button>
          <button class="lc-btn" title="Delete" onclick="event.stopPropagation();deleteLink(${idx})">
            <i class="ti ti-trash"></i>
          </button>
        </div>
      </div>
      <div class="lc-url">${link.url.replace('https://','')}</div>
      <div class="lc-meta">
        <i class="ti ti-clock" style="font-size:11px"></i>
        ${link.lastOpened?timeAgo(link.lastOpened):'never'}
        ${link.pinned?'<span class="pinned-badge">PIN</span>':''}
      </div>`;
    card.onclick=()=>openLink(link,idx);
    grid.appendChild(card);
  });
  const addCard=document.createElement('div');addCard.className='add-link-card';
  addCard.innerHTML=`<i class="ti ti-plus"></i><span>Add sub-link</span>`;
  addCard.onclick=()=>openModal();
  grid.appendChild(addCard);
  content.appendChild(grid);

  // Export zone
  const ez=document.createElement('div');ez.className='export-zone';
  ez.innerHTML=`<span class="export-label"><i class="ti ti-database" style="font-size:13px;vertical-align:-2px"></i>  localStorage + ${USE_BACKEND?'Google Sheets':'no backend'}</span>
    <button class="action-btn" onclick="exportJSON()"><i class="ti ti-download"></i> Export JSON</button>`;
  content.appendChild(ez);
}

// ── ACTION PANEL ──────────────────────────────────────────────
function openActionPanel(){
  actionPanelOpen=true;
  document.getElementById('action-panel').classList.add('open');
  renderActionPanel();
}
function closeActionPanel(){
  actionPanelOpen=false;
  document.getElementById('action-panel').classList.remove('open');
}

function renderActionPanel(){
  const item=data[activeSection]?.[activeKey];
  if(!item)return;
  const ctx=document.getElementById('ap-context');
  ctx.innerHTML=`<span>${activeSection==='tools'?'🔧':'📁'}</span> <span>${activeKey}</span>`;

  const list=document.getElementById('ap-list');
  list.innerHTML='';
  const actions=item.actions||{};
  const keys=Object.keys(actions);

  if(!keys.length){
    list.innerHTML=`<div class="ap-empty">No actions yet.<br>Create one below.</div>`;
    return;
  }

  // Pinned first
  const sorted=[...keys.filter(k=>actions[k].pinned),...keys.filter(k=>!actions[k].pinned)];
  sorted.forEach(aKey=>{
    const a=actions[aKey];
    const typeIcon={prompt:'ti-writing',checklist:'ti-list-check',reference:'ti-bookmark'}[a.type]||'ti-bolt';
    const el=document.createElement('div');
    el.className='ap-action'+(a.pinned?' pinned-action':'');
    el.innerHTML=`
      <div class="ap-action-icon"><i class="ti ${typeIcon}"></i></div>
      <div class="ap-action-body">
        <div class="ap-action-name">${aKey}</div>
        <div class="ap-action-type">${a.type.toUpperCase()}</div>
        <div class="ap-action-last">${a.lastUsed?'Used '+timeAgo(a.lastUsed):'Never used'}</div>
        <div class="ap-action-btns">
          <button class="ap-mini-btn" onclick="event.stopPropagation();useAction('${aKey}')">Open</button>
          <button class="ap-mini-btn" onclick="event.stopPropagation();toggleActionPin('${aKey}')">${a.pinned?'Unpin':'Pin'}</button>
          <button class="ap-mini-btn danger" onclick="event.stopPropagation();deleteAction('${aKey}')">Del</button>
        </div>
      </div>`;
    el.onclick=()=>useAction(aKey);
    list.appendChild(el);
  });
}

function useAction(aKey){
  const item=data[activeSection]?.[activeKey];
  if(!item)return;
  const a=item.actions[aKey];
  if(!a)return;
  // Record last used
  a.lastUsed=Date.now();save();renderActionPanel();
  // Open prompt panel with template
  openPromptPanel(a.template||'');
}

function toggleActionPin(aKey){
  const item=data[activeSection]?.[activeKey];
  if(!item||!item.actions[aKey])return;
  item.actions[aKey].pinned=!item.actions[aKey].pinned;
  save();renderActionPanel();
}

function deleteAction(aKey){
  const item=data[activeSection]?.[activeKey];
  if(!item)return;
  delete item.actions[aKey];
  save();renderActionPanel();
  toast('Action removed');
}

document.getElementById('ap-close-btn').onclick=closeActionPanel;
document.getElementById('ap-add-btn').onclick=openActionModal;

// ── PROMPT PANEL ──────────────────────────────────────────────
function openPromptPanel(template=''){
  promptPanelOpen=true;
  const panel=document.getElementById('prompt-panel');
  panel.classList.add('open');
  if(actionPanelOpen)panel.classList.add('with-actions');
  // Hide main
  document.getElementById('main-area').style.display='none';
  // Fill template with variable substitution
  const today=new Date().toLocaleDateString('en-GB');
  let text=template
    .replace(/\{\{project\}\}/g,activeSection==='projects'?activeKey:'')
    .replace(/\{\{tool\}\}/g,activeSection==='tools'?activeKey:'')
    .replace(/\{\{date\}\}/g,today);
  const ta=document.getElementById('pp-textarea');
  ta.value=text;
  updateCharCount();
  ta.focus();
}

function closePromptPanel(){
  promptPanelOpen=false;
  document.getElementById('prompt-panel').classList.remove('open','with-actions');
  document.getElementById('main-area').style.display='';
}

document.getElementById('prompt-toggle-btn').onclick=()=>{
  if(promptPanelOpen)closePromptPanel();
  else openPromptPanel();
};

function changeFontSize(delta){
  ppFontSize=Math.max(10,Math.min(32,ppFontSize+delta));
  document.getElementById('pp-textarea').style.fontSize=ppFontSize+'px';
  document.getElementById('pp-font-size-label').textContent=ppFontSize;
}

function toggleDir(){
  ppDir=ppDir==='ltr'?'rtl':'ltr';
  const ta=document.getElementById('pp-textarea');
  ta.dir=ppDir;ta.style.textAlign=ppDir==='rtl'?'right':'left';
  const btn=document.getElementById('pp-dir-btn');
  btn.textContent=ppDir.toUpperCase();
  btn.classList.toggle('active',ppDir==='rtl');
}

function ppCopy(){
  const ta=document.getElementById('pp-textarea');
  navigator.clipboard.writeText(ta.value).then(()=>toast('Copied to clipboard ✓'));
}

async function ppPaste(){
  try{
    const text=await navigator.clipboard.readText();
    const ta=document.getElementById('pp-textarea');
    const start=ta.selectionStart,end=ta.selectionEnd;
    ta.value=ta.value.slice(0,start)+text+ta.value.slice(end);
    ta.selectionStart=ta.selectionEnd=start+text.length;
    updateCharCount();
  }catch{toast('Paste failed — use Ctrl+V');}
}

function ppClear(){
  document.getElementById('pp-textarea').value='';updateCharCount();
}

function updateCharCount(){
  const ta=document.getElementById('pp-textarea');
  document.getElementById('pp-char-count').textContent=ta.value.length+' chars';
}

document.getElementById('pp-textarea').addEventListener('input',updateCharCount);

// ── ACTION MODAL ──────────────────────────────────────────────
function openActionModal(){
  document.getElementById('am-name').value='';
  document.getElementById('am-type').value='prompt';
  document.getElementById('am-template').value='';
  document.getElementById('am-pinned').checked=false;
  document.getElementById('action-modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('am-name').focus(),150);
}
function closeActionModal(){document.getElementById('action-modal-overlay').classList.remove('show');}
function confirmActionModal(){
  const name=document.getElementById('am-name').value.trim();
  if(!name)return;
  const item=data[activeSection]?.[activeKey];
  if(!item)return;
  if(!item.actions)item.actions={};
  item.actions[name]={
    type:document.getElementById('am-type').value,
    template:document.getElementById('am-template').value,
    pinned:document.getElementById('am-pinned').checked,
    lastUsed:null,created:Date.now()
  };
  save();closeActionModal();renderActionPanel();
  toast('Action "'+name+'" added');
}
document.getElementById('action-modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeActionModal();});

// ── LINK MODAL ────────────────────────────────────────────────
function openModal(tab){
  switchTab(tab||'link');
  document.getElementById('m-name').value='';
  document.getElementById('m-url').value='';
  document.getElementById('m-icon').value='';
  document.getElementById('m-notes').value='';
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('m-name').focus(),150);
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
function switchTab(tab){
  modalTab=tab;
  document.getElementById('tab-link').classList.toggle('active',tab==='link');
  document.getElementById('tab-project').classList.toggle('active',tab==='project');
  document.getElementById('m-url-field').style.display=tab==='link'?'':'none';
  document.getElementById('m-icon-field').style.display=tab==='project'?'':'none';
}
function confirmModal(){
  const name=document.getElementById('m-name').value.trim();
  if(!name)return;
  if(modalTab==='link'){
    const url=document.getElementById('m-url').value.trim();
    if(!url)return;
    data[activeSection][activeKey].links.push({name,url,pinned:false,lastOpened:null});
    toast('Link added');
  }else{
    const icon=document.getElementById('m-icon').value.trim()||'folder';
    const sec=activeSection;
    if(data[sec][name]){toast('Name exists');closeModal();return;}
    data[sec][name]={icon,status:'active',
      notes:{text:document.getElementById('m-notes').value,status:'active',lastUpdated:Date.now()},
      links:[],actions:{}};
    activeKey=name;
    toast('Project added');
  }
  save();closeModal();renderAll();
}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── ADD SIDEBAR BUTTONS ────────────────────────────────────────
document.getElementById('add-project-btn').onclick=()=>openModal('project');
document.getElementById('add-tool-btn').onclick=()=>{openModal('project');};

// ── LINK ACTIONS ──────────────────────────────────────────────
function openLink(link,idx){
  if(idx!==undefined){data[activeSection][activeKey].links[idx].lastOpened=Date.now();save();}
  window.open(link.url,'_blank');
}
function togglePin(idx){data[activeSection][activeKey].links[idx].pinned=!data[activeSection][activeKey].links[idx].pinned;save();renderMain();}
function copyUrl(url){navigator.clipboard.writeText(url).then(()=>toast('URL copied'));}
function deleteLink(idx){data[activeSection][activeKey].links.splice(idx,1);save();renderMain();toast('Link removed');}
function setStatus(val){if(data[activeSection]?.[activeKey])data[activeSection][activeKey].status=val;save();renderSidebar();}
function updateNoteStatus(val){if(data[activeSection]?.[activeKey])data[activeSection][activeKey].notes.status=val;save();}

// ── SIDEBAR TOGGLE ────────────────────────────────────────────
document.getElementById('collapse-btn').onclick=()=>{
  sidebarOpen=!sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed',!sidebarOpen);
};

// ── EXPORT / IMPORT ───────────────────────────────────────────
function exportJSON(){
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='eyc-empire-backup.json';a.click();toast('Exported');
}
document.getElementById('export-btn').onclick=exportJSON;
document.getElementById('import-btn').onclick=()=>document.getElementById('import-file').click();
document.getElementById('import-file').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=evt=>{
    try{data=JSON.parse(evt.target.result);migrateData();save();renderAll();toast('Imported');}
    catch{toast('Invalid JSON');}
  };
  r.readAsText(file);e.target.value='';
});

// ── SEARCH ────────────────────────────────────────────────────
const searchInput=document.getElementById('search-input');
const searchResults=document.getElementById('search-results');
searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim().toLowerCase();
  if(!q){searchResults.classList.remove('show');return;}
  const results=[];
  ['projects','tools'].forEach(sec=>{
    Object.keys(data[sec]||{}).forEach(key=>{
      (data[sec][key].links||[]).forEach((link,idx)=>{
        if(link.name.toLowerCase().includes(q)||key.toLowerCase().includes(q))
          results.push({sec,key,link,idx});
      });
    });
  });
  if(!results.length){searchResults.innerHTML=`<div style="padding:14px;font-family:var(--mono);font-size:12px;color:var(--text3);text-align:center">No results</div>`;}
  else{
    searchResults.innerHTML=results.slice(0,8).map((r,i)=>`
      <div class="sr-item" onclick="goResult(${i})">
        <div>
          <div class="sr-proj">${r.sec.toUpperCase()} / ${r.key}</div>
          <div class="sr-name">${r.link.name}</div>
          <div class="sr-url">${r.link.url.replace('https://','')}</div>
        </div>
        <i class="ti ti-external-link" style="color:var(--text3);font-size:13px;margin-left:auto"></i>
      </div>`).join('');
    searchResults._results=results;
  }
  searchResults.classList.add('show');
});
window.goResult=function(i){
  const r=searchResults._results[i];
  activeSection=r.sec;activeKey=r.key;
  searchInput.value='';searchResults.classList.remove('show');
  renderAll();setTimeout(()=>openLink(r.link,r.idx),100);
};
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))searchResults.classList.remove('show');});

// ── KEYBOARD SHORTCUTS ────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='s'||e.key==='S'){searchInput.focus();e.preventDefault();return;}
  if(e.key==='c'||e.key==='C'){document.getElementById('collapse-btn').click();return;}
  if(e.key==='n'||e.key==='N'){openModal('link');return;}
  if(e.key==='e'||e.key==='E'){exportJSON();return;}
  if(e.key==='p'||e.key==='P'){promptPanelOpen?closePromptPanel():openPromptPanel();return;}
  if(e.key==='Escape'){closeModal();closeActionModal();searchResults.classList.remove('show');return;}
  const num=parseInt(e.key);
  const pkeys=Object.keys(data.projects||{});
  if(num>=1&&num<=pkeys.length){activeSection='projects';activeKey=pkeys[num-1];renderAll();}
});

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

// ── HELPERS ───────────────────────────────────────────────────
function fmtDate(ts){if(!ts)return '';return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});}
function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';
}
function renderAll(){renderSidebar();renderMain();if(actionPanelOpen)renderActionPanel();}

// ── INIT ──────────────────────────────────────────────────────
switchTab('link');
loadData();
</script>
</body>
</html>
